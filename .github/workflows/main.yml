name: Deploy to EC2
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_DNS }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.SSH_PEM_KEY }}
          script: |
            cd ~/Spring2026SWE-Backend
            git pull origin main
            npm install
            npm run build
            pm2 restart all
